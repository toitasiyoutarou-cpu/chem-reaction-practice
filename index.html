<script>
const tabs=[...document.querySelectorAll('.tab')];
const home=document.getElementById('home');
const reactionFrame=document.getElementById('reactionFrame');
const quantFrame=document.getElementById('quantFrame');
function show(view){
  tabs.forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  home.style.display=view==='home'?'block':'none';
  reactionFrame.classList.toggle('active',view==='reaction');
  quantFrame.classList.toggle('active',view==='quant');
}
document.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>show(el.dataset.view)));
</script>
